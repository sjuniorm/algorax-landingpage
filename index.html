<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoraX | Coming Soon</title>
    <meta name="description" content="AlgoraX - Elite Trading Algorithm Indicator. Coming Soon.">
    <link rel="icon" type="image/png" href="final color .png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --purple-deep: #0a0014;
            --purple-dark: #120024;
            --purple-mid: #2d0a5e;
            --purple-bright: #8b2fc9;
            --purple-glow: #b44dff;
            --purple-light: #d896ff;
            --white: #ffffff;
            --white-muted: rgba(255, 255, 255, 0.7);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--purple-deep);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 50% 50%, rgba(45, 10, 94, 0.5) 0%, transparent 70%),
                radial-gradient(ellipse 60% 80% at 80% 20%, rgba(139, 47, 201, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 20% 80%, rgba(139, 47, 201, 0.1) 0%, transparent 60%),
                linear-gradient(180deg, #050010 0%, #0a0014 30%, #120024 100%);
        }

        /* Animated light streaks */
        .light-streak {
            position: fixed;
            z-index: 1;
            pointer-events: none;
        }

        .light-streak-1 {
            top: -20%;
            left: -10%;
            width: 120%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(180, 77, 255, 0.3), rgba(180, 77, 255, 0.6), rgba(180, 77, 255, 0.3), transparent);
            transform: rotate(-25deg);
            animation: streak1 8s ease-in-out infinite;
        }

        .light-streak-2 {
            bottom: -10%;
            right: -10%;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(180, 77, 255, 0.2), rgba(180, 77, 255, 0.5), rgba(180, 77, 255, 0.2), transparent);
            transform: rotate(20deg);
            animation: streak2 10s ease-in-out infinite;
        }

        .light-streak-3 {
            top: 30%;
            right: -20%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(216, 150, 255, 0.15), rgba(216, 150, 255, 0.35), rgba(216, 150, 255, 0.15), transparent);
            transform: rotate(-15deg);
            animation: streak3 12s ease-in-out infinite;
        }

        @keyframes streak1 {
            0%, 100% { opacity: 0.3; transform: rotate(-25deg) translateX(-5%); }
            50% { opacity: 0.8; transform: rotate(-25deg) translateX(5%); }
        }

        @keyframes streak2 {
            0%, 100% { opacity: 0.2; transform: rotate(20deg) translateX(5%); }
            50% { opacity: 0.6; transform: rotate(20deg) translateX(-5%); }
        }

        @keyframes streak3 {
            0%, 100% { opacity: 0.15; transform: rotate(-15deg) translateX(-3%); }
            50% { opacity: 0.5; transform: rotate(-15deg) translateX(3%); }
        }

        /* Floating particles */
        canvas#particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* Glow orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            pointer-events: none;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(139, 47, 201, 0.12);
            top: -100px;
            right: -100px;
            animation: orbFloat1 15s ease-in-out infinite;
        }

        .glow-orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(180, 77, 255, 0.08);
            bottom: -80px;
            left: -80px;
            animation: orbFloat2 18s ease-in-out infinite;
        }

        .glow-orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(216, 150, 255, 0.06);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orbFloat3 12s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-30px, 40px); }
            66% { transform: translate(20px, -20px); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(40px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        @keyframes orbFloat3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            padding: 2rem;
        }

        /* Logo */
        .logo-wrapper {
            position: relative;
            margin-bottom: 3rem;
            animation: logoEntry 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .logo-wrapper::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 40px;
            background: radial-gradient(ellipse, rgba(180, 77, 255, 0.2), transparent);
            filter: blur(10px);
        }

        .logo {
            width: min(420px, 80vw);
            height: auto;
            filter: drop-shadow(0 0 30px rgba(180, 77, 255, 0.15));
            transition: filter 0.4s ease;
        }

        .logo:hover {
            filter: drop-shadow(0 0 50px rgba(180, 77, 255, 0.3));
        }

        @keyframes logoEntry {
            0% { opacity: 0; transform: translateY(-30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Coming Soon text */
        .coming-soon {
            animation: textEntry 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            opacity: 0;
            margin-bottom: 1.5rem;
        }

        .coming-soon h1 {
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--white) 0%, var(--purple-light) 50%, var(--white) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
            line-height: 1.1;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes textEntry {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Subtitle */
        .subtitle {
            animation: textEntry 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
            opacity: 0;
            margin-bottom: 3rem;
        }

        .subtitle p {
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            font-weight: 300;
            color: var(--white-muted);
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        /* Divider line */
        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple-glow), transparent);
            margin-bottom: 3rem;
            animation: textEntry 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
            opacity: 0;
        }

        /* Tagline */
        .tagline {
            animation: textEntry 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
            opacity: 0;
            margin-bottom: 2.5rem;
        }

        .tagline p {
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.05em;
            max-width: 500px;
            line-height: 1.7;
        }

        /* Social / Discord link */
        .cta-section {
            animation: textEntry 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.85rem 2rem;
            border: 1px solid rgba(180, 77, 255, 0.3);
            border-radius: 50px;
            background: rgba(180, 77, 255, 0.08);
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .discord-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(180, 77, 255, 0.15), rgba(139, 47, 201, 0.15));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .discord-btn:hover {
            border-color: rgba(180, 77, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(180, 77, 255, 0.15);
        }

        .discord-btn:hover::before {
            opacity: 1;
        }

        .discord-btn svg {
            width: 20px;
            height: 20px;
            position: relative;
            z-index: 1;
        }

        .discord-btn span {
            position: relative;
            z-index: 1;
        }

        /* Bottom grid lines (subtle) */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(180, 77, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 77, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black, transparent);
            -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black, transparent);
        }

        /* Noise texture overlay */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* Vignette */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(5, 0, 16, 0.6) 100%);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
            .logo-wrapper {
                margin-bottom: 2rem;
            }
            .divider {
                margin-bottom: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background layers -->
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>
    <div class="light-streak light-streak-1"></div>
    <div class="light-streak light-streak-2"></div>
    <div class="light-streak light-streak-3"></div>
    <canvas id="particles"></canvas>
    <div class="noise"></div>
    <div class="vignette"></div>

    <!-- Main content -->
    <div class="container">
        <div class="logo-wrapper">
            <img src="final 2 black.png" alt="AlgoraX Logo" class="logo">
        </div>

        <div class="coming-soon">
            <h1>Coming Soon</h1>
        </div>

        <div class="subtitle">
            <p>Trade with clarity.</p>
        </div>

        <div class="divider"></div>

        <div class="tagline">
            <p>We're building something powerful. An elite trading algorithm indicator designed to give you the edge in every market.</p>
        </div>

        <div class="cta-section">
            <a href="https://discord.gg/977KmrHXX2" class="discord-btn" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
                <span>Join Our Discord</span>
            </a>
        </div>
    </div>

    <script>
        // Particle system
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.3;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.4 + 0.1;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.02 + 0.005;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.pulse += this.pulseSpeed;

                // Mouse interaction - gentle repel
                if (mouse.x !== null) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        const force = (120 - dist) / 120 * 0.3;
                        this.x += (dx / dist) * force;
                        this.y += (dy / dist) * force;
                    }
                }

                if (this.x < -10 || this.x > canvas.width + 10 || 
                    this.y < -10 || this.y > canvas.height + 10) {
                    this.reset();
                }
            }

            draw() {
                const currentOpacity = this.opacity * (0.7 + Math.sin(this.pulse) * 0.3);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 77, 255, ${currentOpacity})`;
                ctx.fill();

                // Glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 77, 255, ${currentOpacity * 0.1})`;
                ctx.fill();
            }
        }

        // Create particles
        const particleCount = Math.min(80, Math.floor(window.innerWidth * window.innerHeight / 15000));
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // Draw connecting lines
        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const opacity = (1 - dist / 150) * 0.08;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(180, 77, 255, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            drawLines();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
